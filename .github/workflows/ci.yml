name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ─── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

  # ─── Job 2: Typecheck ────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm turbo typecheck

  # ─── Job 3: Unit tests (with retry) ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (attempt 1)
        id: test1
        continue-on-error: true
        run: pnpm turbo test

      - name: Run tests (retry attempt 2)
        id: test2
        if: steps.test1.outcome == 'failure'
        continue-on-error: true
        run: pnpm turbo test

      - name: Run tests (retry attempt 3)
        id: test3
        if: steps.test2.outcome == 'failure'
        run: pnpm turbo test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            packages/*/coverage/
            packages/*/*.xml
          retention-days: 7
          if-no-files-found: ignore

  # ─── Job 4: Build packages ───────────────────────────────────────────────────
  build-packages:
    name: Build packages
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library packages
        run: pnpm turbo build --filter=!@harish-ui/docs --filter=!@harish-ui/storybook

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: packages/*/dist
          retention-days: 1

  # ─── Job 5: Build docs ───────────────────────────────────────────────────────
  build-docs:
    name: Build docs (Next.js)
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: packages

      - name: Build docs
        run: pnpm turbo build --filter=@harish-ui/docs

      - name: Upload docs build
        uses: actions/upload-artifact@v4
        with:
          name: docs-build
          path: apps/docs/.next
          retention-days: 1

  # ─── Job 6: Build Storybook ──────────────────────────────────────────────────
  build-storybook:
    name: Build Storybook
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: packages

      - name: Build Storybook
        run: pnpm turbo build --filter=@harish-ui/storybook

      - name: Upload Storybook build
        uses: actions/upload-artifact@v4
        with:
          name: storybook-build
          path: apps/storybook/storybook-static
          retention-days: 1

  # ─── Job 7: Summary gate ─────────────────────────────────────────────────────
  # Branch protection only needs to require this single job
  ci-ok:
    name: CI passed
    needs: [lint, typecheck, test, build-docs, build-storybook]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          if echo "$results" | grep -q '"result": "failure"'; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
